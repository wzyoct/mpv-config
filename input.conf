# 空格：暂停/继续，同时触发 uosc 暂停动画（闪烁而非固定图标，截图不含图标）
SPACE               cycle pause ; script-binding uosc/flash-pause-indicator

# 回车：切换全屏，同时刷新 uosc 全屏状态
ENTER               cycle fullscreen ; script-message-to uosc flash-elements fullscreen

# 右键：打开 uosc 主菜单（带背景模糊效果）
MBTN_RIGHT          script-binding uosc/menu-blurred

# Ctrl+V：从剪贴板加载链接/路径直接播放
Ctrl+v              loadfile ${clipboard/text}


# ================================================================
#  音量控制（上下键）
# ================================================================

# 上键：音量 +5，同时刷新 uosc 音量显示
UP                  no-osd add volume  5 ; script-message-to uosc flash-elements volume

# 下键：音量 -5，同时刷新 uosc 音量显示
DOWN                no-osd add volume -5 ; script-message-to uosc flash-elements volume


# ================================================================
#  播放速度（6 档循环，[ 减速 / ] 加速）
#
#  档位：1x → 1.25x → 1.5x → 1.75x → 2x → 2.5x → 3x
# ================================================================

# [ 键：向慢档切换（3x→2.5x→2x→1.75x→1.5x→1.25x→1x 循环）
[                   no-osd cycle-values speed 3 2.5 2 1.75 1.5 1.25 1 ; script-message-to uosc flash-elements speed

# ] 键：向快档切换（1x→1.25x→1.5x→1.75x→2x→2.5x→3x 循环）
]                   no-osd cycle-values speed 1 1.25 1.5 1.75 2 2.5 3 ; script-message-to uosc flash-elements speed


# ================================================================
#  字幕
# ================================================================

# Alt+[：字幕缩小 0.1 级
Alt+[               add sub-scale -0.1 ; show-text "字幕缩小：${sub-scale}"

# Alt+]：字幕放大 0.1 级
Alt+]               add sub-scale  0.1 ; show-text "字幕放大：${sub-scale}"


# `键：打开控制台
`                   script-binding console/enable

# 双击鼠标左键：切换全屏
MBTN_LEFT_DBL       cycle fullscreen ; script-message-to uosc flash-elements fullscreen


# ESC：退出全屏（若在全屏则退出全屏，否则无动作）
ESC                 set fullscreen no

# Shift+I：打开/关闭统计页
Shift+i             script-binding stats/display-stats-toggle

# ================================================================
#  快进 / 后退（左右键）
# ================================================================

# 左键：后退 5 秒
LEFT                no-osd seek -5 ; script-message-to uosc flash-elements timeline

# 右键：前进 5 秒
RIGHT               no-osd seek  5 ; script-message-to uosc flash-elements timeline