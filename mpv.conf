# ################################################################
#
#   MPV 统一配置文件
#   分为全局设置与按机器性能切换的 profile 两部分
#   profile 定义在 profiles.conf，由本文件末尾 include 引入
#
# ################################################################

# ================================================================
#  渲染后端
# ================================================================
vo=gpu-next
gpu-api=d3d11                   # Windows 首选，HDR 直通最稳定
hwdec=d3d11va                   # D3D11VA 硬件解码
hwdec-codecs=all                # 对所有编码格式启用硬解

# ================================================================
#  色彩管理（HDR 直通模式）
# ================================================================
target-colorspace-hint=yes      # 向系统声明色彩空间，触发 OS 级 HDR 直通
tone-mapping=clip               # 超出范围直接截断，不做软件色调映射
gamut-mapping-mode=clip         # 色域同样截断，原始信号直出，交由显示器处理
hdr-compute-peak=no             # 关闭逐帧峰值计算，避免 AV1/HDR 全屏紫屏

# ================================================================
#  窗口与界面
# ================================================================
osc=no                          # 禁用内置控制栏，由 uosc 接管
osd-bar=no                      # 禁用内置进度条，由 uosc 接管
border=no                       # 隐藏系统标题栏与窗口边框
autofit-larger=50%x50%          # 初始窗口尺寸不超过屏幕的 50%
geometry=50%:50%                # 启动时窗口居中显示
keep-open=yes                   # 播放结束后保持窗口，不自动退出

# ================================================================
#  字幕
# ================================================================
sub-auto=fuzzy                  # 模糊匹配同名字幕文件
slang=chs,sc,zh-Hans,zh-CN,cht,tc,zh-Hant,zh-HK,zh-TW,chi,zho,zh

# ================================================================
#  音轨优先级
# ================================================================
alang=japanese,jpn,jap,ja,jp,english,eng,en

# ================================================================
#  网络播放与缓冲
# ================================================================
cache=yes
demuxer-max-bytes=2048MiB       # 前向缓冲，网络串流够用
demuxer-max-back-bytes=256MiB   # 后向缓冲，用于回跳
cache-pause=no                  # 缓冲期间不暂停，保持播放


# ================================================================
#  输入
# ================================================================
no-input-default-bindings       # 禁用所有默认快捷键，仅 input.conf 中的生效

# ================================================================
#  其他
# ================================================================
load-stats-overlay=no
script-opts=ytdl_hook-ytdl_path=yt-dlp.exe

include=~~/profiles.conf