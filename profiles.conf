# ================================================================
#  高质量缩放 profile（高配机使用）
# ================================================================
[powerful]
fbo-format=rgba16f              # 显式指定浮点帧缓冲，线性光管线必需
scale=ewa_lanczossharp          # 高质量极坐标 Lanczos 上采样
cscale=ewa_lanczossharp         # 色度平面同样高质量处理
dscale=mitchell                 # 下采样使用 Mitchell，锐度与振铃平衡好
linear-downscaling=yes          # 在线性光空间做下采样，减少混叠
sigmoid-upscaling=yes           # Sigmoid 曲线上采样，抑制振铃

# ================================================================
#  轻量模式 profile（低配机使用）
# ================================================================
[lite]
scale=bilinear
cscale=bilinear
dscale=bilinear
linear-downscaling=no
sigmoid-upscaling=no
vd-lavc-threads=0               # 让 FFmpeg 自动决定解码线程数
profile=fast                    # 继承 mpv 内置 fast profile，进一步降低开销

# ################################################################
#  默认激活的 profile —— 按当前机器性能选择
# ################################################################
[default]
profile=powerful                # 高配机默认；低配机改为 lite